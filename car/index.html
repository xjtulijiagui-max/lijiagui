      <header class="hero" id="top"><div class="hero-inner"><p class="kicker">Prompt Library for Automotive Video</p><h1>汽车提示词合集</h1><p class="hero-copy">面向汽车短视频生成与剪辑的提示词资料库，覆盖通用公式、广告分镜、剪映适配和品牌幕后操盘手故事。</p><div class="stats" aria-label="页面统计"><div class="stat"><strong id="stat-prompts">0</strong><span>提示词卡片</span></div><div class="stat"><strong id="stat-types">0</strong><span>内容分类</span></div><div class="stat"><strong id="stat-brands">0</strong><span>品牌故事</span></div></div></div></header>

  <button class="back-top" type="button" aria-label="回到顶部" title="回到顶部" onclick="window.scrollTo({top:0,behavior:'smooth'})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m18 15-6-6-6 6"></path></svg></button>
  <script>(function clientScript() {
  const SOURCE_TEXT = "# 剪映&即梦 汽车短视频提示词合集\n\n## 一、即梦AI 通用提示词框架\n### 1. 万能正向公式\n主体描述 + 动作描述 + 场景与空间 + 光线与氛围 + 镜头与运镜 + 画质关键词\n（越靠前的词权重越高，描述越具体，AI生成结果越精准）\n\n### 2. 通用兜底词\n- 画质词：8K超高清，细节拉满，电影级质感，构图完美，主体突出，色彩自然，人体结构正常\n- 反向提示词（必填）：模糊，低清，畸形，扭曲，水印，logo，杂乱背景，过曝，多余肢体，五官变形\n\n\n## 二、即梦AI 汽车类实战提示词\n### 1. 汽车科普故事类（奥迪A7案例）\n#### 文生图提示词\n主体：一位穿着黑色简约T恤、黑色长裤、白色运动鞋，佩戴手表，手拿香烟的帅气动漫男性，手持黑色雨伞\n车辆：奥迪A7（车头经典立标显眼，车牌为京A88888）\n场景：雨夜的都市街道，地面潮湿反光，霓虹灯点缀的现代建筑，路灯散发暖光\n环境细节：右侧有婚纱店橱窗（展示白色婚纱），背景有朦胧的树木与其他车辆，整体氛围湿润、都市感十足且略带氛围感\n艺术风格：写实风与动漫风格结合，光影细腻，色彩偏向冷调的雨夜质感\n\n#### 图生视频提示词\n人物转身看向身后的婚纱店，表情若有所思，香烟飘着烟，天空下着雨\n\n\n### 2. 汽车广告宣传类（红旗SUV案例）\n#### 15s品牌短片完整提示词\n# 视频主题:15s红旗SUV品牌质感短片\n【镜头序列(丝滑连贯)】\n0-2s:特写镜头，一只手按下红色汽车一键启动按钮，按钮亮起红光，轻微震动反馈，背景虚化，氛围感拉满。\n2-4s:车内第一视角，清爽短发男性握着方向盘，窗外城市夜景流光快速划过，镜头随方向盘轻微晃动，营造动态速度感。\n4-6s:后视镜特写，反射出男性专注的眼神，背景是日落时分的公路，暖金色阳光洒入车内，镜头缓慢推近，突出人物神态。\n6-8s:低角度跟拍全景，红色红旗SUV行驶在盘山公路上，背景是层叠山峦与橙红色晚霞，画面大气开阔，车辆动态丝滑。\n8-10s:海边慢镜头，红色红旗SUV停在悬崖边，男性站在车旁面朝大海，背景是广阔海面与蓝天，镜头缓慢拉远，营造宁静自由的氛围。\n10-12s:雨夜侧方跟拍，红色红旗SUV行驶在霓虹闪烁的城市街道，雨滴打在车窗上，灯光在玻璃上折射出彩色光斑，镜头从侧方跟拍，突出车辆的动感与雨夜氛围感。\n12-14s:侧窗中景，男性坐在驾驶位，眼神坚定看向前方，窗外大雨瓢泼，镜头轻微拉近，突出人物沉稳气质，雨丝细节清晰。\n14-15s:航拍远景收尾，红色红旗SUV在城市天际线前行驶，镜头缓慢拉远，展现城市高楼与红色车辆的鲜明对比，画面定格在车辆向前行驶的动态瞬间。\n【画面风格】 电影级质感，8K分辨率，HDR高动态范围，自然光影，电影级调色，色彩层次丰富，运镜流畅丝滑，无抖动，转场自然衔接，人物表情自然，车辆细节真实，无AI瑕疵，画面稳定，动态模糊自然，氛围大气磅礴、现代高级，比例16:9。\n【背景音乐和音效】增加背景音乐和音效，不要生成字幕。\n\n\n#### 九宫格分镜提示词\n请你扮演一位专业的电影分镜师，为红旗SUV创建一个3x3网格布局的九宫格商业广告故事分镜图片，每一张分镜图都要有区分。\n(通用规则)风格:写实电影风，构图充满强烈的电影感和视觉冲击力\n核心元素:画面中只出现一辆左舵驾驶的红旗SUV和一名男主角。男主角形象:一位帅气的男子，身穿简约的灰色短袖T恤和黑色长裤。\n强制要求:每个分镜的左上角，必须用统一、清晰的字体和格式标注场景编号，顺序为“C1”、“C2”、“C3”... 直至“C9”。\n(分镜画面要求)\nC1:低角度仰拍。红旗SUV从镜头前高速驶过，男主角在驾驶位上眼神坚定，背景是繁华的城市天际线。\nC2:大远景。红旗SUV在蜿蜒的盘山公路上加速驶向夕阳，画面留白，男主角在车内。\nC3:侧面中景。红旗SUV在雨中行驶，车窗上挂着雨珠，透过车窗能看到男主角专注的侧脸。\nC4:低角度仰拍。红旗SUV停在海边悬崖旁，男主角靠在车门上眺望远方。\nC5:车内后视镜特写。从车内后视镜中看到男主角的眼睛，背景是模糊的夕阳余晖和道路。\nC6:全景镜头。红旗SUV在现代都市的霓虹灯下疾驰，车身线条流畅，透过车窗可见男主角的身影。\nC7:中景跟拍。男主角在车内露出自信的微笑，窗外光影掠过。\nC8:特写镜头。男主角戴着时尚眼镜，眼神专注，手握红旗SUV的方向盘。\nC9:细节特写。男主角的手指轻轻按下车内的启动按钮。\n\n\n## 三、剪映适配提示词\n剪映的AI生成/智能多帧功能提示词逻辑与即梦通用，可直接替换车辆、场景参数复用上述模板，针对剪   function inferType(item) {
    const location = [item.section, item.title].join(' ');
    const text = [location, item.content].join(' ');
    if (/品牌幕后|创始人|掌舵人|品牌起源|创业故事|汽车之父|品牌故事视频/.test(text)) return '品牌故事';
    if (/剪映适配|智能多帧/.test(text)) return '剪映适配';
    if (/汽车类实战|广告宣传|红旗|奥迪A7|九宫格|分镜|文生图|图生视频/.test(location)) return '实战案例';
    return '通用框架';
  }
  function summarize(content) {
    const lines = content.split('\n').map(line => line.trim()).filter(Boolean).filter(line => !isNoiseLine(line));
    const first = lines.find(line => !/^\(?通用规则\)?/.test(line)) || lines[0] || '';
    return first.replace(/^[-*]\s*/, '').slice(0, 88);
  }
  function parseSource(text) {
    const lines = text.replace(/\r\n/g, '\n').split('\n');
    let collection = '';
    let section = '总览';
    let sub = '';
    let current = null;
    const items = [];
    function pushCurrent() {
      if (!current) return;
      const content = current.lines.join('\n').trim();
      if (content && !content.split('\n').every(isNoiseLine)) {
        const item = {
          id: 'p' + String(items.length + 1).padStart(2, '0'),
          title: current.title,
          section: current.section,
          collection: current.collection,
          content,
          summary: summarize(content)
        };
        item.type = inferType(item);
        item.search = [item.title, item.section, item.collection, item.type, item.content].join('\n').toLowerCase();
        items.push(item);
      }
      current = null;
    }
    lines.forEach(line => {
      if (/^#\s+(?!视频主题[:：])/.test(line)) {
        pushCurrent();
        const heading = cleanHeading(line);
        collection = heading;
        section = heading;
        sub = '';
        return;
      }
      if (/^##\s+/.test(line)) {
        pushCurrent();
        section = cleanHeading(line);
        sub = '';
        current = { title: section, section, collection, lines: [] };
        return;
      }
      if (/^###\s+/.test(line)) {
        pushCurrent();
        sub = cleanHeading(line);
        current = { title: sub, section, collection, lines: [] };
        return;
      }
      if (/^####\s+/.test(line)) {
        pushCurrent();
        const heading = cleanHeading(line);
        current = { title: sub ? sub + ' / ' + heading : heading, section, collection, lines: [] };
        return;
      }
      if (current) current.lines.push(line);
    });
    pushCurrent();
    return items;
  }

  const items = parseSource(SOURCE_TEXT);
  function typeClass(type) { return 'type-' + type.replace(/\s+/g, '-'); }
  function renderCards() {
    grid.innerHTML = items.map(item => `
      <article class="prompt-card" id="${item.id}" data-type="${escapeHtml(item.type)}" data-search="${escapeHtml(item.search)}">
        <div class="card-top">
          <div>
            <div class="badge-row">
              <span class="badge ${typeClass(item.type)}">${escapeHtml(item.type)}</span>
              <span class="badge">${escapeHtml(item.section.replace(/^\d+\.\s*/, '').slice(0, 24))}</span>
            </div>
            <h3>${escapeHtml(item.title.replace(/^\d+\.\s*/, ''))}</h3>
            <p class="summary">${escapeHtml(item.summary)}</p>
          </div>
          <button class="copy-btn" type="button" onclick="copyPrompt('${item.id}', this)" title="复制">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg><span>复制</span>
          </button>
        </div>
        <pre><code>${escapeHtml(item.content)}</code></pre>
      </article>`).join('');
  }
  function renderFilters() {
    const counts = new Map(TYPE_ORDER.map(type => [type, 0]));
    counts.set('全部', items.length);
    items.forEach(item => counts.set(item.type, (counts.get(item.type) || 0) + 1));
    filters.innerHTML = TYPE_ORDER.map(type => `<button type="button" class="filter-btn ${activeType === type ? 'is-active' : ''}" data-type="${type}"><span>${type}</span><b>${counts.get(type) || 0}</b></button>`).join('');
    filters.querySelectorAll('.filter-btn').forEach(button => button.addEventListener('click', () => {
      activeType = button.dataset.type;
      renderFilters();
      applyFilter();
    }));
  }
  function renderToc() {
    const sectionMap = new Map();
    items.forEach(item => {
      const label = item.section.replace(/^\d+\.\s*/, '');
      if (!sectionMap.has(label)) sectionMap.set(label, { id: item.id, count: 0 });
      sectionMap.get(label).count += 1;
    });
    toc.innerHTML = [...sectionMap.entries()].slice(0, 18).map(([label, data]) => `<a href="#${data.id}"><span>${escapeHtml(label)}</span><em>${data.count}</em></a>`).join('');
  }
  function applyFilter() {
    const normalized = query.trim().toLowerCase();
    let visible = 0;
    document.querySelectorAll('.prompt-card').forEach(card => {
      const show = (activeType === '全部' || card.dataset.type === activeType) && (!normalized || card.dataset.search.includes(normalized));
      card.classList.toggle('is-hidden', !show);
      if (show) visible += 1;
    });
    empty.classList.toggle('is-visible', visible === 0);
    countNote.textContent = '当前显示 ' + visible + ' / ' + items.length + ' 条';
  }
  async function copyPrompt(id, button) {
    const text = document.getElementById(id).querySelector('code').textContent.trim();
    try {
      await navigator.clipboard.writeText(text);
    } catch (error) {
      const area = document.createElement('textarea');
      area.value = text;
      area.style.position = 'fixed';
      area.style.opacity = '0';
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
    }
    const label = button.querySelector('span');
    const old = label.textContent;
    label.textContent = '已复制';
    setTimeout(() => { label.textContent = old; }, 1200);
  }
  window.copyPrompt = copyPrompt;
  function bindSearch(input, mirror) {
    input.addEventListener('input', () => {
      query = input.value;
      if (mirror && mirror.value !== query) mirror.value = query;
      applyFilter();
    });
  }
  renderCards();
  renderFilters();
  renderToc();
  bindSearch(search, mobileSearch);
  bindSearch(mobileSearch, search);
  document.getElementById('stat-prompts').textContent = items.length;
  document.getElementById('stat-types').textContent = new Set(items.map(item => item.type)).size;
  document.getElementById('stat-brands').textContent = items.filter(item => item.type === '品牌故事').length;
  applyFilter();
})();</script>
</body>
